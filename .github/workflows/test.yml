# GitHub Actions CI/CD Pipeline for Test Execution
# Generated by BMad TEA Agent - Test Architect Module
# Optimized for: Code Quality, Test Coverage (Matrix), Burn-In Loop
# Stack: backend | Framework: pytest

name: Test Pipeline

on:
  push:
    branches: [main, beta, stable]
  pull_request:
    branches: [main, beta, stable]
    types: [opened, synchronize, reopened, labeled]
  schedule:
    # Weekly burn-in on Sundays at 2 AM UTC
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint stage - Code quality checks
  lint:
    name: Lint (Python 3.9)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run linter
        run: |
          set -euo pipefail
          # Restrict lint scope to the maintained Python daemon and its tests.
          flake8 resources/daemon tests

  # Test stage - execution with coverage
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests with coverage
        run: |
          set -euo pipefail
          # Security: inputs passed through env: to prevent script injection
          python -m pytest --cov=resources/daemon --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 30

  # Burn-in stage - Flaky test detection
  burn-in:
    name: Burn-In (Python 3.9)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    # Execute only on schedule or if PR has 'burn-in' label
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'burn-in'))

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run burn-in loop (10 iterations)
        run: |
          set -euo pipefail
          echo "🔥 Starting burn-in loop - detecting flaky tests"
          for i in {1..10}; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔥 Burn-in iteration $i/10"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            # Burn-in must use the same command scope as main tests for consistency
            python -m pytest --cov=resources/daemon --cov-report=term-missing || exit 1
          done
          echo "✅ Burn-in complete - no flaky tests detected"

  # Report stage - Aggregate and publish results
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [lint, test, burn-in]
    if: always()

    steps:
      - name: Generate summary
        run: |
          set -euo pipefail
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status (Lint)**: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status (Tests)**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Burn-in**: ${{ needs.burn-in.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "⚠️ **Flaky tests detected** - Review burn-in logs" >> $GITHUB_STEP_SUMMARY
          fi
